# Elevator HMI — custom extlinux.conf for Boardcon EM3566 v3 bring-up
#
# Uses explicit 'fdt' line to avoid U-Boot fdtdir guessing the wrong DTB
# filename (it defaults to rockchip-evb_rk3568.dtb from $fdtfile env).
# root= targets mmcblk0p2 (rootfs_a, WIC partition 2 at --offset 16M).
# console= matches the EM3566 v3 debug UART at 1.5 Mbd (ttyS2).

default Yocto
label Yocto
   kernel /Image
   fdt /elevator-hmi-boardcon-em3566-v3.dtb
   append root=/dev/mmcblk0p2 rw rootfstype=ext4 rootwait console=ttyS2,1500000
