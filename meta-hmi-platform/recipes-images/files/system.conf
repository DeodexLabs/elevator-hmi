# Partition order must match meta-hmi-platform/wic/elevator-hmi-emmc.wks.in (GPT):
#   p1 boot (vfat), p2 rootfs_a, p3 rootfs_b, p4 data
# TASK-111: previous p4/p5 matched legacy 6-part layout; WIC is authoritative until lsblk on target says otherwise.

[system]
compatible=elevator-hmi
bootloader=u-boot

[slot.rootfs.0]
device=/dev/mmcblk0p2
type=ext4
bootname=a

[slot.rootfs.1]
device=/dev/mmcblk0p3
type=ext4
bootname=b
