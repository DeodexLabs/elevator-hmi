# We have a conf and classes directory, append to BBPATH
BBPATH .= ":${LAYERDIR}"

# Recipes will be added in later tasks; keep BBFILES valid for empty layers
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "hmi-platform"
BBFILE_PATTERN_hmi-platform := "^${LAYERDIR}/"
BBFILE_PRIORITY_hmi-platform = "8"

LAYERDEPENDS_hmi-platform = "core openembedded-layer rockchip"
LAYERVERSION_hmi-platform = "1"
LAYERSERIES_COMPAT_hmi-platform = "scarthgap"

# WIC / image: expose Phase 0 eMMC kickstart path to the wic environment (see image_types_wic.bbclass WICVARS)
WICVARS:append = " ELEVATOR_HMI_EMMC_WKS"
ELEVATOR_HMI_EMMC_WKS = "${LAYERDIR}/wic/elevator-hmi-emmc.wks.in"

# WIC / image: expose Phase 0 eMMC kickstart path to the wic environment (see image_types_wic.bbclass WICVARS)
WICVARS:append = " ELEVATOR_HMI_EMMC_WKS"
ELEVATOR_HMI_EMMC_WKS = "${LAYERDIR}/wic/elevator-hmi-emmc.wks.in"
