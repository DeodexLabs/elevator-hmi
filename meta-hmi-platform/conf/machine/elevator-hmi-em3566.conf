#@TYPE: Machine
#@NAME: Elevator HMI — Boardcon EM3566 v3 reference (RK3566 + LMT101 on DSI0)
#
# Inherits RK3566 EVB2 LP4X V10 machine tuning from meta-rockchip (Wi‑Fi, U-Boot,
# tune files). Overrides only the kernel DTB to the project Boardcon bring-up DTS
# (TASK-104). Do not edit meta-rockchip — this file lives in meta-hmi-platform.
#
# U-Boot / eMMC (TASK-102): inherits `UBOOT_MACHINE = "rk3568_defconfig"` and
# Rockchip loader packaging from `rockchip-rk3566-evb`. On-chip storage is
# eMMC (mmcblk0). Flash with vendor `rkdeveloptool` / `upgrade_tool` or WIC
# image per `meta-hmi-platform/wic/elevator-hmi-emmc.wks.in` + BSP docs.

require conf/machine/rockchip-rk3566-evb.conf

KERNEL_DEVICETREE = "rockchip/elevator-hmi-boardcon-em3566-v3.dtb"
KERNEL_IMAGETYPE = "Image"
# extlinux.conf is generated from meta-hmi-platform/wic/elevator-hmi-extlinux.conf
# via WKS bootloader --configfile. The bootimg-partition WIC plugin does NOT
# read UBOOT_EXTLINUX_FDT / UBOOT_EXTLINUX_ROOT from BitBake; those variables
# are dead code in this plugin path. Custom config is the only hook.
UBOOT_EXTLINUX = "1"

# bootimg-partition WIC plugin reads IMAGE_BOOT_FILES to populate the vfat /boot
# partition. meta-rockchip does not set this variable. Deploy dir produces both
# files flat (Yocto kernel recipe strips the arch/arm64/boot/ prefix on deploy).
IMAGE_BOOT_FILES = "Image elevator-hmi-boardcon-em3566-v3.dtb"
