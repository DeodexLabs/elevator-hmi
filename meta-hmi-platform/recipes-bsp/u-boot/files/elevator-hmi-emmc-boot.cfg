# Elevator HMI — TASK-102 Kconfig fragment (merged into vendor U-Boot .config).
# RK3566 CM3566 / Boardcon EM3566 v3 uses onboard eMMC. Stock rk3568_defconfig
# already enables these; repeating them keeps merge_config.sh happy and documents
# the eMMC-first bring-up assumption (mmc dev 0, GPT, WIC from TASK-003).
CONFIG_CMD_MMC=y
CONFIG_CMD_GPT=y
CONFIG_MMC_DW_ROCKCHIP=y
CONFIG_SYS_MMCSD_RAW_MODE_U_BOOT_USE_PARTITION=y
